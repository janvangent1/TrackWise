# Nginx configuration for TrackWise Web on Raspberry Pi
#
# Installation:
#   sudo cp nginx.conf /etc/nginx/sites-available/trackwise
#   sudo ln -s /etc/nginx/sites-available/trackwise /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t
#   sudo systemctl restart nginx
#
# For HTTPS (optional — requires certbot):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d your-domain.example.com

server {
    listen 80;
    server_name _;         # catch-all; replace with your hostname or IP

    # Increase upload size limit for GPX files
    client_max_body_size 10M;

    # Disable proxy buffering for SSE streams
    proxy_buffering off;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE — disable nginx buffering per request
        proxy_set_header   X-Accel-Buffering no;

        # Connection keep-alive for SSE
        proxy_set_header   Connection        '';
        proxy_read_timeout 300s;
    }

    # Serve static files directly (bypass FastAPI for performance)
    location /static/ {
        alias /home/pi/trackwise/web/frontend/static/;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;
}
